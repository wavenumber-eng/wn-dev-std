name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  governance:
    name: governance / dev-std
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Sync
        run: uv sync --all-extras
      - name: Run dev-std governance audit
        run: uv run dev-std audit .

  test:
    name: ${{ matrix.os }} / Python 3.12
    needs: governance
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Sync
        run: uv sync --all-extras
      - name: Run Rack signoff
        run: uv run rack run --all
      - name: Build package
        run: uv run python -m build
      - name: Check package
        run: uv run twine check dist/*
      - name: Installed wheel smoke test
        shell: pwsh
        run: |
          $wheel = Get-ChildItem dist -Filter "*.whl" | Select-Object -First 1
          uv tool install --force $wheel.FullName
          wn-dev-std --version
          wn-dev-std standard
