name = "Foundation"
order = 0
description = "Basic public package, CLI, and interface behavior"
enabled = true
concerns = ["cli", "contracts"]

objectives = [
    "The package exposes the expected public version string",
    "The CLI supports version and help entry points",
    "Public standard interfaces are importable and usable",
]

